<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JittyDaGod's Web</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff6b00, #ffb366);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
}

/* CENTER BOX */
.container {
    background: linear-gradient(135deg, #003d1a, #001a0d);
    padding: 60px 80px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
}

/* TITLE */
h1 {
    color: white;
    font-size: 3rem;
    text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.4);
}

/* BUTTONS */
.button-container {
    display: flex;
    gap: 20px;
}

.btn {
    padding: 15px 30px;
    font-size: 1.1rem;
    font-weight: bold;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s ease;
    text-decoration: none;
}

.youtube {
    background: #ff0000;
}

.youtube:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #ff0000;
}

.discord {
    background: #5865F2;
}

.discord:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #5865F2;
}

/* mouse trail */
.trail {
    position: fixed;
    width: 10px;
    height: 10px;
    background: limegreen;
    border-radius: 50%;
    pointer-events: none;
    box-shadow: 0 0 10px limegreen;
    animation: fade 0.6s linear forwards;
}

@keyframes fade {
    to {
        transform: scale(0);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>JittyDaGod</h1>

    <div class="button-container">
        <a class="btn youtube" href="https://www.youtube.com/@JittyDaGod52" target="_blank">
            🎥 YouTube
        </a>

        <a class="btn discord" href="https://discord.com" target="_blank">
            💬 Discord
        </a>
    </div>
</div>

<script>
document.addEventListener("mousemove", function(e) {
    const dot = document.createElement("div");
    dot.className = "trail";

    dot.style.left = e.clientX + "px";
    dot.style.top = e.clientY + "px";

    document.body.appendChild(dot);

    setTimeout(() => {
        dot.remove();
    }, 600);
});
</script>

</body>
</html>
