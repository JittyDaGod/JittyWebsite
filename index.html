<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jitty's Web</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "DM Sans", sans-serif;
}

body {
  min-height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at center, #120008 0%, #07000a 50%, #000 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

/* STARS */
#stars {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  border-radius: 50%;
  background: rgba(255,255,255,0.8);
  animation: twinkle 4s infinite ease-in-out;
}

@keyframes twinkle {
  0%,100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.8); }
}

/* NEBULA */
.nebula {
  position: fixed;
  width: 900px;
  height: 900px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,0,60,0.25), transparent 60%);
  filter: blur(90px);
  z-index: 0;
}

/* RAIN */
.rain {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}

.drop {
  position: absolute;
  width: 1px;
  height: 20px;
  background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,0,60,0.7));
  animation: fall linear infinite;
  opacity: 0.5;
}

@keyframes fall {
  0% { transform: translateY(-10vh); opacity: 0; }
  10% { opacity: 0.7; }
  100% { transform: translateY(110vh); opacity: 0; }
}

/* FLOAT */
@keyframes float {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-40px); }
}

/* LAYOUT */
.wrapper {
  z-index: 2;
  display: flex;
  gap: 26px;
  align-items: center;
}

/* PANEL */
.panel {
  background: rgba(255,0,50,0.10);
  border: 1px solid rgba(255,255,255,0.10);
  backdrop-filter: blur(18px);
  border-radius: 22px;
  padding: 28px;
  box-shadow: 0 0 45px rgba(255,0,60,0.20);
  transition: 0.3s;
}

.panel:hover {
  transform: translateY(-6px);
  box-shadow: 0 0 70px rgba(255,0,60,0.35);
}

/* PROFILE */
.profile {
  width: 380px;
  text-align: center;
}

.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 2px solid rgba(255,0,60,0.7);
  box-shadow: 0 0 25px rgba(255,0,60,.6), 0 0 60px rgba(255,0,60,.3);
}

.name {
  margin-top: 14px;
  font-family: "Syne";
  font-weight: 800;
  font-size: 22px;
}

.username {
  opacity: 0.6;
  font-size: 15px;
}

/* STATUS */
.status {
  margin-top: 16px;
  padding: 12px;
  border-radius: 14px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.08);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 14px;
}

.dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
}

/* SOCIALS */
.socials {
  width: 320px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.socials a {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: white;
  padding: 14px 16px;
  border-radius: 14px;
  background: rgba(255,0,60,0.12);
  border: 1px solid rgba(255,255,255,0.08);
  transition: 0.25s;
}

.socials a:hover {
  transform: scale(1.05);
  background: rgba(255,0,60,0.25);
}

/* ABOUT */
.about {
  position: absolute;
  bottom: 35px;
  width: 760px;
  text-align: center;
}

.about h2 {
  font-family: "Syne";
  margin-bottom: 10px;
}

.about p {
  opacity: 0.8;
  line-height: 1.6;
}

/* TRAIL */
.trail-dot {
  position: fixed;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  pointer-events: none;
  background: radial-gradient(circle, white, rgba(255,0,60,0.7));
  box-shadow: 0 0 12px red, 0 0 20px white;
  transform: translate(-50%, -50%);
  animation: fadeOut 0.8s linear forwards;
  z-index: 9999;
}

@keyframes fadeOut {
  to { opacity: 0; transform: translate(-50%, -50%) scale(0); }
}

/* MOBILE */
@media (max-width: 900px) {
  .wrapper {
    flex-direction: column;
  }
  .about {
    width: 90%;
  }
}
</style>
</head>

<body>

<div id="stars"></div>
<div class="nebula"></div>
<div class="rain"></div>

<div class="wrapper">

  <div class="panel profile">
    <img id="avatar" class="avatar" />
    <div class="name" id="name">Loading...</div>
    <div class="username" id="username"></div>

    <div class="status">
      <div class="dot" id="dot"></div>
      <span id="activityText">Checking activity...</span>
    </div>
  </div>

  <div class="panel socials">
    <a href="https://www.youtube.com/@jittydagod52" target="_blank">
      <i class="fab fa-youtube"></i> YouTube
    </a>
    <a href="https://steamcommunity.com/profiles/76561199209130468/" target="_blank">
      <i class="fab fa-steam"></i> Steam
    </a>
    <a href="https://www.roblox.com/users/1338031913/profile" target="_blank">
      <i class="fas fa-cube"></i> Roblox
    </a>
    <a href="https://discord.gg/pnNVpGyB" target="_blank">
      <i class="fab fa-discord"></i> Discord
    </a>
  </div>

</div>

<!-- ABOUT -->
<div class="panel about">
  <h2>About Me</h2>
  <p>
    Hey, I'm Jitty. I build websites, play games, and create digital projects.
    Welcome to my personal space on the internet.
  </p>
</div>

<script>
/* STARS */
const stars = document.getElementById("stars");
for (let i = 0; i < 300; i++) {
  const s = document.createElement("div");
  s.className = "star";
  s.style.top = Math.random()*100 + "%";
  s.style.left = Math.random()*100 + "%";
  s.style.animationDuration = (2 + Math.random()*4) + "s";
  stars.appendChild(s);
}

/* RAIN */
const rain = document.querySelector(".rain");
function createRain(){
  const d = document.createElement("div");
  d.className = "drop";
  d.style.left = Math.random()*100 + "vw";
  d.style.height = (12 + Math.random()*28) + "px";
  d.style.animationDuration = (0.6 + Math.random()*0.9) + "s";
  rain.appendChild(d);
  setTimeout(() => d.remove(), 2500);
}
setInterval(createRain, 25);

/* TRAIL */
document.addEventListener("mousemove", (e) => {
  const d = document.createElement("div");
  d.className = "trail-dot";
  d.style.left = e.clientX + "px";
  d.style.top = e.clientY + "px";
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 800);
});

/* DISCORD */
const ID = "1138567381887746159";

function color(s){
  return {
    online:"#43b581",
    idle:"#faa61a",
    dnd:"#f04747",
    offline:"#747f8d"
  }[s] || "#747f8d";
}

function formatActivity(a){
  if (!a) return null;
  if (a.type === 4) return `💬 ${a.state || "Custom Status"}`;
  if (a.type === 0) return `🎮 Playing ${a.name}`;
  if (a.type === 1) return `🔴 Streaming ${a.name}`;
  if (a.type === 2) return `🎧 Listening to ${a.name}`;
  if (a.type === 3) return `📺 Watching ${a.name}`;
  return a.name || "Unknown activity";
}

async function load(){
  try {
    const res = await fetch(`https://api.lanyard.rest/v1/users/${ID}`);
    const json = await res.json();
    const d = json.data;
    const u = d.discord_user;

    document.getElementById("name").textContent = u.global_name || u.username;
    document.getElementById("username").textContent = "@" + u.username;
    document.getElementById("avatar").src =
      `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png`;

    document.getElementById("dot").style.background = color(d.discord_status);

    const activities = d.activities || [];
    const formatted = activities.map(formatActivity).filter(Boolean).join(" • ");

    document.getElementById("activityText").textContent =
      formatted || d.discord_status || "No activity";

  } catch (e) {
    document.getElementById("activityText").textContent = "Discord offline";
  }
}

load();
setInterval(load, 10000);
</script>

</body>
</html>
